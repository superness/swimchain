name: WASM Build

on:
  push:
    branches: [main]
    paths:
      - "chainsocial-wasm/**"
      - "chainsocial-js/**"
      - ".github/workflows/wasm.yml"
  pull_request:
    branches: [main]
    paths:
      - "chainsocial-wasm/**"
      - "chainsocial-js/**"
      - ".github/workflows/wasm.yml"

env:
  CARGO_TERM_COLOR: always
  # Bundle size limit in bytes (500KB gzipped)
  BUNDLE_SIZE_LIMIT: 512000

jobs:
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: chainsocial-wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build chainsocial-wasm --target web --release

      - name: Check bundle size (gzipped)
        run: |
          WASM_FILE="chainsocial-wasm/pkg/chainsocial_wasm_bg.wasm"
          if [ ! -f "$WASM_FILE" ]; then
            echo "ERROR: WASM file not found at $WASM_FILE"
            exit 1
          fi

          RAW_SIZE=$(stat -c %s "$WASM_FILE")
          GZIP_SIZE=$(gzip -c "$WASM_FILE" | wc -c)

          echo "WASM bundle sizes:"
          echo "  Raw:     $(numfmt --to=iec-i --suffix=B $RAW_SIZE)"
          echo "  Gzipped: $(numfmt --to=iec-i --suffix=B $GZIP_SIZE)"
          echo ""
          echo "Limit: $(numfmt --to=iec-i --suffix=B $BUNDLE_SIZE_LIMIT)"

          if [ $GZIP_SIZE -gt $BUNDLE_SIZE_LIMIT ]; then
            echo ""
            echo "ERROR: Bundle size $GZIP_SIZE bytes exceeds limit of $BUNDLE_SIZE_LIMIT bytes"
            echo "Please optimize the WASM build or adjust the limit if necessary."
            exit 1
          fi

          echo ""
          echo "Bundle size check passed!"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: chainsocial-wasm/pkg/
          retention-days: 7

  test-wasm:
    name: Test WASM
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: chainsocial-wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Run WASM tests
        run: wasm-pack test --node chainsocial-wasm

  build-js:
    name: Build JavaScript
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: chainsocial-js/pkg/

      - name: Install dependencies
        working-directory: chainsocial-js
        run: npm install

      - name: Build TypeScript
        working-directory: chainsocial-js
        run: npm run build:ts

      - name: Type check
        working-directory: chainsocial-js
        run: npx tsc --noEmit

  build-react:
    name: Build React Package
    runs-on: ubuntu-latest
    needs: build-js
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: chainsocial-js/pkg/

      - name: Install JS package dependencies
        working-directory: chainsocial-js
        run: npm install

      - name: Build JS package
        working-directory: chainsocial-js
        run: npm run build:ts

      - name: Install React package dependencies
        working-directory: chainsocial-react
        run: npm install

      - name: Build React package
        working-directory: chainsocial-react
        run: npm run build

      - name: Type check
        working-directory: chainsocial-react
        run: npx tsc --noEmit
