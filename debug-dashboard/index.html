<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swimchain Network Visualizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Monaco', 'Menlo', monospace; background: #0a0a15; color: #eee; overflow: hidden; }

        /* Main Layout */
        .container { display: flex; height: 100vh; }
        .sidebar { width: 320px; background: #12121f; border-right: 1px solid #2a2a4a; overflow-y: auto; padding: 15px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .viz-container { flex: 1; position: relative; }
        .bottom-panel { height: 200px; background: #12121f; border-top: 1px solid #2a2a4a; padding: 10px; overflow-y: auto; }

        /* Sidebar */
        h1 { color: #4fc3f7; font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        h2 { color: #81d4fa; font-size: 12px; text-transform: uppercase; margin: 15px 0 8px; letter-spacing: 1px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: #1a1a2e; border-radius: 6px; padding: 10px; text-align: center; }
        .stat-value { font-size: 24px; color: #4fc3f7; }
        .stat-label { font-size: 10px; color: #666; text-transform: uppercase; }

        /* Node List */
        .node-list { margin-top: 10px; }
        .node-item { background: #1a1a2e; border-radius: 6px; padding: 10px; margin-bottom: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .node-item:hover { border-color: #4fc3f7; }
        .node-item.selected { border-color: #4caf50; background: #1a2e1a; }
        .node-item.offline { opacity: 0.4; }
        .node-name { font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .node-status { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .node-status.online { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
        .node-status.offline { background: #f44336; }
        .node-meta { font-size: 10px; color: #666; margin-top: 5px; }

        /* SVG Canvas */
        #network-svg { width: 100%; height: 100%; background: radial-gradient(ellipse at center, #0d1525 0%, #0a0a15 100%); }

        /* Network Elements */
        .node-circle { cursor: pointer; transition: all 0.3s; }
        .node-circle:hover { filter: brightness(1.3); }
        .node-label { font-size: 10px; fill: #81d4fa; pointer-events: none; }
        .link { stroke: #2a3a5a; stroke-width: 1.5; fill: none; }
        .link.active { stroke: #4fc3f7; stroke-width: 3; filter: drop-shadow(0 0 4px #4fc3f7); animation: pulse-link 0.5s; }
        @keyframes pulse-link { 0% { stroke-width: 3; } 50% { stroke-width: 6; } 100% { stroke-width: 3; } }

        /* Message Particles */
        .particle { fill: #ffeb3b; }
        @keyframes travel { 0% { offset-distance: 0%; opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }

        /* Content Debug */
        .content-tools { display: flex; gap: 8px; margin-bottom: 10px; }
        .content-tools input { flex: 1; background: #1a1a2e; border: 1px solid #2a3a5a; color: #fff; padding: 8px; border-radius: 4px; font-family: monospace; }
        .content-tools button { background: #2a3a5a; border: none; color: #fff; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .content-tools button:hover { background: #3a4a6a; }

        /* Log */
        .log { font-size: 11px; font-family: monospace; }
        .log-entry { padding: 4px 0; border-bottom: 1px solid #1a1a2e; display: flex; gap: 10px; }
        .log-time { color: #666; width: 70px; flex-shrink: 0; }
        .log-msg { flex: 1; }
        .log-entry.success .log-msg { color: #4caf50; }
        .log-entry.error .log-msg { color: #f44336; }
        .log-entry.info .log-msg { color: #81d4fa; }
        .log-entry.warn .log-msg { color: #ff9800; }

        /* Tooltip */
        #tooltip { position: absolute; background: #1a1a2e; border: 1px solid #4fc3f7; border-radius: 6px; padding: 10px; font-size: 11px; pointer-events: none; display: none; z-index: 100; max-width: 300px; }
        #tooltip h3 { color: #4fc3f7; margin-bottom: 5px; }
        #tooltip table { width: 100%; }
        #tooltip td { padding: 2px 0; }
        #tooltip td:first-child { color: #666; }

        /* Badges */
        .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 9px; margin-left: 5px; }
        .badge.has { background: #2e7d32; }
        .badge.missing { background: #c62828; }
        .badge.pending { background: #f57c00; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Swimchain Network</h1>

            <h2>Network Stats</h2>
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="stat-value" id="total-nodes">0</div>
                    <div class="stat-label">Nodes</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="total-connections">0</div>
                    <div class="stat-label">Connections</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="total-height">0</div>
                    <div class="stat-label">Max Height</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="total-content">0</div>
                    <div class="stat-label">Content</div>
                </div>
            </div>

            <h2>Nodes</h2>
            <div class="node-list" id="node-list"></div>

            <h2>Content Lookup</h2>
            <div class="content-tools">
                <input type="text" id="content-id" placeholder="sha256:...">
            </div>
            <div class="content-tools">
                <button onclick="checkContentAllNodes()">Check All Nodes</button>
                <button onclick="requestAndPoll()">Request & Poll</button>
            </div>
            <div id="content-status" style="margin-top: 10px; font-size: 11px;"></div>
        </div>

        <div class="main">
            <div class="viz-container">
                <svg id="network-svg">
                    <defs>
                        <radialGradient id="node-gradient">
                            <stop offset="0%" stop-color="#6dd5ed"/>
                            <stop offset="100%" stop-color="#2193b0"/>
                        </radialGradient>
                        <radialGradient id="node-selected-gradient">
                            <stop offset="0%" stop-color="#81c784"/>
                            <stop offset="100%" stop-color="#4caf50"/>
                        </radialGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="blur"/>
                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7"/>
                        </marker>
                    </defs>
                    <g id="links-layer"></g>
                    <g id="nodes-layer"></g>
                    <g id="particles-layer"></g>
                </svg>
                <div id="tooltip"></div>
            </div>

            <div class="bottom-panel">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <h2 style="margin: 0;">Activity Log</h2>
                    <button onclick="clearLog()" style="background: #2a3a5a; border: none; color: #fff; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 10px;">Clear</button>
                </div>
                <div class="log" id="activity-log"></div>
            </div>
        </div>
    </div>

    <script>
        // Node discovery - scan common ports
        const NODE_CONFIGS = [
            { name: 'genesis', dataDir: 'genesis-testnet' },
            { name: 'alpha', dataDir: 'alpha-testnet' },
            { name: 'beta', dataDir: 'beta-testnet' },
            { name: 'gamma', dataDir: 'gamma-testnet' },
            { name: 'omega1', dataDir: 'omega1-testnet' },
            { name: 'omega2', dataDir: 'omega2-testnet' },
            { name: 'omega3', dataDir: 'omega3-testnet' },
            { name: 'omega4', dataDir: 'omega4-testnet' },
            { name: 'omega5', dataDir: 'omega5-testnet' },
            { name: 'omega6', dataDir: 'omega6-testnet' },
            { name: 'omega7', dataDir: 'omega7-testnet' },
            { name: 'omega8', dataDir: 'omega8-testnet' },
            { name: 'omega9', dataDir: 'omega9-testnet' },
            { name: 'omega10', dataDir: 'omega10-testnet' },
            { name: 'omega11', dataDir: 'omega11-testnet' },
            { name: 'omega12', dataDir: 'omega12-testnet' },
            { name: 'ultra1', dataDir: 'ultra1-testnet' },
            { name: 'ultra2', dataDir: 'ultra2-testnet' },
            { name: 'ultra3', dataDir: 'ultra3-testnet' },
            { name: 'ultra4', dataDir: 'ultra4-testnet' },
            { name: 'ultra5', dataDir: 'ultra5-testnet' },
            { name: 'ultra6', dataDir: 'ultra6-testnet' },
            { name: 'ultra7', dataDir: 'ultra7-testnet' },
            { name: 'ultra8', dataDir: 'ultra8-testnet' },
        ];

        // State
        let nodes = new Map();  // name -> {port, peerId, peers, height, ...}
        let connections = [];   // {from, to}
        let selectedNode = null;
        let simulation = null;

        // Check if running via proxy or direct
        const IS_PROXIED = window.location.port === '3000' || window.location.pathname.includes('proxy');

        // RPC helper - uses proxy if available
        async function rpc(nodeNameOrPort, method, params = {}) {
            try {
                let url, nodeName;
                if (IS_PROXIED) {
                    // Use proxy API
                    nodeName = typeof nodeNameOrPort === 'string' ? nodeNameOrPort : portToNodeName(nodeNameOrPort);
                    url = `/api/rpc/${nodeName}`;
                } else {
                    // Direct RPC (requires auth disabled or same-origin)
                    url = `http://127.0.0.1:${nodeNameOrPort}/`;
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jsonrpc: '2.0', method, params, id: 1 })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.result;
            } catch (e) {
                throw e;
            }
        }

        function portToNodeName(port) {
            const map = { 19736: 'genesis', 19746: 'alpha', 19756: 'beta', 19766: 'gamma' };
            return map[port] || `node-${port}`;
        }

        // Discover nodes via proxy or port scanning
        async function discoverNodes() {
            if (IS_PROXIED) {
                // Get node list from proxy
                try {
                    const response = await fetch('/api/nodes');
                    const nodeList = await response.json();
                    const discovered = [];
                    for (const node of nodeList) {
                        try {
                            const info = await rpc(node.name, 'get_info');
                            discovered.push({ port: parseInt(node.port), name: node.name, info });
                        } catch {}
                    }
                    return discovered;
                } catch (e) {
                    log('error', `Proxy not available: ${e.message}`);
                    return [];
                }
            }

            // Direct port scanning (fallback)
            const startPort = 19736;
            const endPort = 29000;
            const discovered = [];

            for (let port = startPort; port < endPort; port += 100) {
                const batch = [];
                for (let p = port; p < Math.min(port + 100, endPort); p++) {
                    batch.push(checkPort(p));
                }
                const results = await Promise.all(batch);
                results.forEach(r => r && discovered.push(r));
            }

            return discovered;
        }

        async function checkPort(port) {
            try {
                const info = await Promise.race([
                    rpc(port, 'get_info'),
                    new Promise((_, reject) => setTimeout(() => reject(), 500))
                ]);
                return { port, info };
            } catch { return null; }
        }

        // Refresh all node data
        async function refreshNodes() {
            const discovered = await discoverNodes();

            nodes.clear();
            connections = [];

            for (const disc of discovered) {
                const { port, info } = disc;
                const name = disc.name || guessNodeName(port) || `node-${port}`;
                const rpcTarget = IS_PROXIED ? name : port;

                const nodeData = {
                    name,
                    port,
                    peerId: info.node_id || info.identity_id || '',
                    height: info.height || 0,
                    peerCount: info.peer_count || 0,
                    version: info.version || 'unknown',
                    peers: [],
                    online: true
                };

                // Get peer details
                try {
                    const peers = await rpc(rpcTarget, 'get_peers');
                    nodeData.peers = peers || [];
                } catch {}

                // Get DHT info
                try {
                    const dht = await rpc(rpcTarget, 'dht_status');
                    nodeData.dht = dht;
                } catch {}

                nodes.set(name, nodeData);
            }

            // Build connections from peer data
            buildConnections();
            updateStats();
            renderNodeList();
            renderNetwork();

            log('info', `Discovered ${nodes.size} nodes, ${connections.length} connections`);
        }

        function guessNodeName(port) {
            // Common port patterns
            const portMap = {
                19736: 'genesis', 19746: 'alpha', 19756: 'beta', 19766: 'gamma',
            };
            if (portMap[port]) return portMap[port];

            // Try to match omega/ultra pattern
            for (let i = 1; i <= 12; i++) {
                if (port >= 20000 + i * 100 && port < 20000 + (i + 1) * 100) return `omega${i}`;
            }
            for (let i = 1; i <= 8; i++) {
                if (port >= 25000 + i * 100 && port < 25000 + (i + 1) * 100) return `ultra${i}`;
            }
            return null;
        }

        function buildConnections() {
            connections = [];
            const seen = new Set();

            nodes.forEach((nodeData, nodeName) => {
                nodeData.peers.forEach(peer => {
                    // Try to match peer to a known node
                    const peerNode = findNodeByPeerId(peer.peer_id);
                    if (peerNode && peerNode !== nodeName) {
                        const key = [nodeName, peerNode].sort().join('-');
                        if (!seen.has(key)) {
                            seen.add(key);
                            connections.push({ from: nodeName, to: peerNode });
                        }
                    }
                });
            });
        }

        function findNodeByPeerId(peerId) {
            for (const [name, data] of nodes) {
                if (data.peerId && peerId.startsWith(data.peerId.substring(0, 16))) {
                    return name;
                }
            }
            return null;
        }

        function updateStats() {
            document.getElementById('total-nodes').textContent = nodes.size;
            document.getElementById('total-connections').textContent = connections.length;

            let maxHeight = 0;
            nodes.forEach(n => maxHeight = Math.max(maxHeight, n.height));
            document.getElementById('total-height').textContent = maxHeight;
        }

        function renderNodeList() {
            const container = document.getElementById('node-list');
            container.innerHTML = '';

            const sorted = [...nodes.entries()].sort((a, b) => a[0].localeCompare(b[0]));

            sorted.forEach(([name, data]) => {
                const div = document.createElement('div');
                div.className = `node-item ${data.online ? '' : 'offline'} ${selectedNode === name ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="node-name">
                        ${name}
                        <span class="node-status ${data.online ? 'online' : 'offline'}"></span>
                    </div>
                    <div class="node-meta">
                        Port ${data.port} | Height ${data.height} | ${data.peerCount} peers
                    </div>
                `;
                div.onclick = () => selectNode(name);
                container.appendChild(div);
            });
        }

        function selectNode(name) {
            selectedNode = name;
            renderNodeList();
            renderNetwork();

            const data = nodes.get(name);
            if (data) {
                log('info', `Selected ${name}: height=${data.height}, peers=${data.peerCount}`);
            }
        }

        function renderNetwork() {
            const svg = document.getElementById('network-svg');
            const width = svg.clientWidth || 800;
            const height = svg.clientHeight || 500;

            // Position nodes in a circle
            const nodeArray = [...nodes.entries()];
            const cx = width / 2;
            const cy = height / 2;
            const radius = Math.min(width, height) * 0.35;

            nodeArray.forEach(([name, data], i) => {
                const angle = (i / nodeArray.length) * Math.PI * 2 - Math.PI / 2;
                data.x = cx + Math.cos(angle) * radius;
                data.y = cy + Math.sin(angle) * radius;
            });

            // Render links
            const linksLayer = document.getElementById('links-layer');
            linksLayer.innerHTML = connections.map(c => {
                const from = nodes.get(c.from);
                const to = nodes.get(c.to);
                if (!from || !to) return '';
                return `<line class="link" x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" data-from="${c.from}" data-to="${c.to}"/>`;
            }).join('');

            // Render nodes
            const nodesLayer = document.getElementById('nodes-layer');
            nodesLayer.innerHTML = nodeArray.map(([name, data]) => {
                const isSelected = name === selectedNode;
                const r = isSelected ? 25 : 18;
                const fill = isSelected ? 'url(#node-selected-gradient)' : 'url(#node-gradient)';
                return `
                    <g class="node-group" data-name="${name}">
                        <circle class="node-circle" cx="${data.x}" cy="${data.y}" r="${r}" fill="${fill}" filter="url(#glow)" onclick="selectNode('${name}')"/>
                        <text class="node-label" x="${data.x}" y="${data.y + r + 15}" text-anchor="middle">${name}</text>
                        <text class="node-label" x="${data.x}" y="${data.y + 4}" text-anchor="middle" fill="#fff" font-size="9">${data.height}</text>
                    </g>
                `;
            }).join('');
        }

        // Animate message between nodes
        function animateMessage(fromNode, toNode) {
            const from = nodes.get(fromNode);
            const to = nodes.get(toNode);
            if (!from || !to) return;

            // Highlight link
            const link = document.querySelector(`line[data-from="${fromNode}"][data-to="${toNode}"], line[data-from="${toNode}"][data-to="${fromNode}"]`);
            if (link) {
                link.classList.add('active');
                setTimeout(() => link.classList.remove('active'), 500);
            }

            // Create particle
            const particle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            particle.setAttribute('r', '4');
            particle.setAttribute('class', 'particle');
            particle.setAttribute('cx', from.x);
            particle.setAttribute('cy', from.y);
            document.getElementById('particles-layer').appendChild(particle);

            // Animate
            const duration = 500;
            const startTime = Date.now();
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                particle.setAttribute('cx', from.x + (to.x - from.x) * progress);
                particle.setAttribute('cy', from.y + (to.y - from.y) * progress);
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    particle.remove();
                }
            }
            animate();
        }

        // Helper to get RPC target (node name for proxy, port for direct)
        function getRpcTarget(nodeName) {
            const data = nodes.get(nodeName);
            return IS_PROXIED ? nodeName : (data?.port || nodeName);
        }

        // Content checking
        async function checkContentAllNodes() {
            const contentId = document.getElementById('content-id').value.trim();
            if (!contentId) return;

            log('info', `Checking content ${contentId.substring(0, 20)}... on all nodes`);
            const statusDiv = document.getElementById('content-status');
            statusDiv.innerHTML = 'Checking...';

            const results = [];
            for (const [name, data] of nodes) {
                try {
                    const rpcTarget = getRpcTarget(name);
                    const result = await rpc(rpcTarget, 'content_providers', { content_id: contentId });
                    results.push({
                        name,
                        hasLocal: result.have_locally,
                        knownPeers: result.known_peers?.length || 0,
                        dhtProviders: result.dht_providers?.length || 0
                    });
                } catch (e) {
                    results.push({ name, error: e.message });
                }
            }

            // Display results
            statusDiv.innerHTML = results.map(r => {
                if (r.error) return `<div>${r.name}: <span class="badge missing">ERROR</span></div>`;
                const badge = r.hasLocal ? '<span class="badge has">HAS</span>' : '<span class="badge missing">NO</span>';
                return `<div>${r.name}: ${badge} peers:${r.knownPeers} dht:${r.dhtProviders}</div>`;
            }).join('');

            const hasCount = results.filter(r => r.hasLocal).length;
            log(hasCount > 0 ? 'success' : 'warn', `Content found on ${hasCount}/${nodes.size} nodes`);
        }

        async function requestAndPoll() {
            const contentId = document.getElementById('content-id').value.trim();
            if (!contentId || !selectedNode) {
                log('error', 'Select a node and enter content ID');
                return;
            }

            const nodeData = nodes.get(selectedNode);
            if (!nodeData) return;

            const rpcTarget = getRpcTarget(selectedNode);
            log('info', `Requesting ${contentId.substring(0, 20)}... from ${selectedNode}`);

            try {
                const requestResult = await rpc(rpcTarget, 'request_content', { content_id: contentId });
                log('info', `Request sent to ${requestResult.recipients || 0} peers`);

                // Animate to peers
                nodeData.peers.forEach(p => {
                    const peerNode = findNodeByPeerId(p.peer_id);
                    if (peerNode) animateMessage(selectedNode, peerNode);
                });
            } catch (e) {
                log('error', `Request failed: ${e.message}`);
                return;
            }

            // Poll for content
            for (let i = 1; i <= 10; i++) {
                await new Promise(r => setTimeout(r, 1000));
                try {
                    const content = await rpc(rpcTarget, 'get_content', { content_id: contentId });
                    log('success', `Content retrieved on attempt ${i}: "${content.title || content.body?.substring(0, 30) || 'found'}"`);
                    return;
                } catch (e) {
                    log('info', `Attempt ${i}: ${e.message}`);
                }
            }

            log('error', 'Content not found after 10 attempts');
        }

        // Logging
        function log(type, message) {
            const container = document.getElementById('activity-log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `
                <span class="log-time">${new Date().toLocaleTimeString()}</span>
                <span class="log-msg">${message}</span>
            `;
            container.insertBefore(entry, container.firstChild);
            if (container.children.length > 200) container.removeChild(container.lastChild);
        }

        function clearLog() {
            document.getElementById('activity-log').innerHTML = '';
        }

        // Tooltip
        function showTooltip(e, content) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = content;
            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX + 10) + 'px';
            tooltip.style.top = (e.clientY + 10) + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        // Init
        async function init() {
            log('info', 'Starting node discovery...');
            await refreshNodes();

            // Auto-refresh every 10 seconds
            setInterval(refreshNodes, 10000);
        }

        window.onload = init;
        window.onresize = renderNetwork;
    </script>
</body>
</html>
