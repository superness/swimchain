# ChainSocial Web Gateway - Docker Compose Configuration
#
# Usage:
#   docker-compose up -d              # Start gateway
#   docker-compose logs -f            # View logs
#   docker-compose down               # Stop gateway
#   docker-compose pull && docker-compose up -d  # Update
#
# For custom configuration, create a .env file in the same directory
# with your environment variable overrides.

version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GATEWAY_NAME: ${GATEWAY_NAME:-ChainSocial Gateway}
        GATEWAY_OPERATOR: ${GATEWAY_OPERATOR:-}
    container_name: chainsocial-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Gateway Configuration
      - GATEWAY_NAME=${GATEWAY_NAME:-ChainSocial Gateway}
      - GATEWAY_OPERATOR=${GATEWAY_OPERATOR:-}
      - GATEWAY_URL=${GATEWAY_URL:-http://localhost:3000}

      # Node Connection
      - NODE_URL=${NODE_URL:-ws://localhost:8765}
      - NODE_RECONNECT_INTERVAL=${NODE_RECONNECT_INTERVAL:-5000}

      # Rate Limiting
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60000}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Node.js
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      # Persist search index cache (optional)
      - gateway-cache:/app/.cache
    networks:
      - chainsocial
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Optional: Nginx reverse proxy for production
  # Uncomment if you need SSL termination, load balancing, or custom domains
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: chainsocial-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - gateway
  #   networks:
  #     - chainsocial

volumes:
  gateway-cache:

networks:
  chainsocial:
    driver: bridge
