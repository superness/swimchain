# Added inside the swimchain.io TLS server block in
# /etc/nginx/sites-enabled/swimchain.io (before the catch-all `location /`).
# X-Forwarded-For is required: the gateway middleware rate-limits per client IP.
location /browse {
    proxy_pass http://127.0.0.1:3300;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
